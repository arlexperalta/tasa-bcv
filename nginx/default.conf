# Config del contenedor tasa-landing (nginx:alpine) en Contabo.
# Vive montada desde /opt/tasa-nginx/default.conf (ro).
# El no-cache del index hace que cada deploy llegue al teléfono de una:
# el navegador revalida siempre (ETag) y solo baja el archivo si cambió.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
