# Config del contenedor tasa-landing (nginx:alpine) en Contabo.
# Vive montada desde /opt/tasa-nginx/default.conf (ro).
# El no-cache del index hace que cada deploy llegue al teléfono de una:
# el navegador revalida siempre (ETag) y solo baja el archivo si cambió.

# Caché del proxy de USDT. Va aquí (fuera de server) porque nginx.conf incluye
# conf.d/*.conf dentro de http{}.
proxy_cache_path /var/cache/nginx/usdt levels=1:2 keys_zone=usdt:1m max_size=8m inactive=1h use_temp_path=off;
# Caché de la página del BCV (fecha-valor + tasas). inactive largo: si el BCV se
# cae un fin de semana, la última buena sigue sirviendo.
proxy_cache_path /var/cache/nginx/bcv levels=1:2 keys_zone=bcv:1m max_size=16m inactive=72h use_temp_path=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Proxy de la tasa USDT (Binance P2P vía CriptoYa).
    # CriptoYa dejó de permitir fetch desde el navegador (CORS), pero sí responde
    # server-to-server. Al pedirla desde el propio dominio el CORS no aplica: la
    # llamada deja de ser cross-origin. La app pide /api/usdt, nginx la trae.
    location = /api/usdt {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;
        set $usdt_api "https://criptoya.com/api/binancep2p/USDT/VES/100";
        proxy_pass $usdt_api;

        proxy_set_header Host criptoya.com;
        proxy_set_header User-Agent "tasa.arlexperalta.com";
        proxy_set_header Accept "application/json";
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # Fallar rápido: la app ya sabe degradar cuando no hay tasa.
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;

        proxy_cache usdt;
        proxy_cache_key "usdt-ves-100";
        # CriptoYa responde "max-age=30, public, no-store": el no-store le prohíbe
        # cachear a nginx y cada visita pegaría a su API (que ya nos bloquea por IP).
        # Ignoramos sus headers y mandamos nosotros: 60s para una tasa es de sobra.
        proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        proxy_cache_valid 200 60s;
        proxy_cache_lock on;
        # Si la fuente cae, servir la última buena: el payload trae su propio
        # timestamp, así que la app muestra la hora real del dato, no una fresca falsa.
        proxy_cache_use_stale error timeout updating http_403 http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status always;

        # El index se pide con cache:no-store; la tasa la cachea nginx, no el browser.
        add_header Cache-Control "no-store" always;
    }

    # Proxy de la página del BCV. Es la única fuente que publica la fecha-valor:
    # cada tarde hábil sale la tasa del día siguiente (el viernes, la del lunes).
    # dolarapi solo da "la última", sin distinguir vigente de próxima. La app
    # parsea el HTML (fecha-valor + USD + EUR) del lado del cliente.
    location = /api/bcv {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;
        set $bcv_api "https://www.bcv.org.ve/";
        proxy_pass $bcv_api;

        proxy_set_header Host www.bcv.org.ve;
        proxy_set_header User-Agent "tasa.arlexperalta.com";
        proxy_set_header Accept "text/html";
        # sin compresión upstream: nginx necesita el HTML plano para gzipearlo él
        proxy_set_header Accept-Encoding "";
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        proxy_connect_timeout 8s;
        proxy_send_timeout 8s;
        proxy_read_timeout 10s;

        proxy_cache bcv;
        proxy_cache_key "bcv-home";
        proxy_ignore_headers Cache-Control Expires Set-Cookie Vary;
        # ignore evita que nginx los honre; hide evita que lleguen al navegador
        # (el BCV manda max-age=300 que contradice nuestro no-store)
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        # 10 min: el BCV publica una vez al día; esto solo acota el retraso
        # con que los usuarios ven la tasa nueva de la tarde.
        proxy_cache_valid 200 10m;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_403 http_429 http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status always;

        # la página pesa ~150 KB; comprimida baja a ~20
        gzip on;
        gzip_proxied any;

        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
